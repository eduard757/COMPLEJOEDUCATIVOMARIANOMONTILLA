<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Mariano Montilla</title>
    <style>
        :root { --azul-oscuro: #1a2a6c; --azul-claro: #3498db; --rojo-retiro: #e74c3c; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('IMG-20260123-WA0146.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .contenedor { width: 95%; max-width: 900px; text-align: center; padding: 20px; }
        .escudo-animado { width: 100px; animation: flotar 4s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 6px solid var(--azul-oscuro); margin-top: 20px; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { background: var(--azul-oscuro); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--azul-claro); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: var(--azul-oscuro); color: white; padding: 12px; }
        td { border: 1px solid #ddd; padding: 12px; text-align: left; cursor: pointer; }
        .fila-retirado { background-color: #ffcccc !important; color: #c0392b; font-weight: bold; }

        /* MODAL DE LA FICHA */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { 
            background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 550px; 
            border-radius: 15px; text-align: left; position: relative; 
            border-left: 10px solid var(--azul-oscuro);
        }
        .cerrar { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #999; }
        .ficha-titulo { color: var(--azul-oscuro); border-bottom: 2px solid var(--azul-claro); padding-bottom: 10px; margin-top: 0; }
        .dato-item { margin-bottom: 10px; }
        .label { font-weight: bold; color: var(--azul-oscuro); display: block; font-size: 0.85em; text-transform: uppercase; }
        .valor { font-size: 1.1em; color: #333; }
    </style>
</head>
<body>

<div class="contenedor">
    <img src="IMG-20260123-WA0146.jpg" class="escudo-animado">
    <h1 style="color: var(--azul-oscuro);">Gestión Escolar "Mariano Montilla"</h1>

    <div id="login" class="card">
        <h2>🔑 Acceso Administrativo</h2>
        <input type="text" id="user" placeholder="Usuario (MARIANO)">
        <input type="password" id="pass" placeholder="Contraseña (12345)">
        <button onclick="validar()">Entrar al Sistema</button>
    </div>

    <div id="sistema" style="display: none;">
        <div class="card">
            <h3>➕ Registrar Nuevo Alumno</h3>
            <div class="grid-form">
                <input type="text" id="reg-nom" placeholder="Nombres y Apellidos">
                <input type="text" id="reg-ced" placeholder="Cédula de Identidad">
                <input type="text" id="reg-esc" placeholder="Cédula Escolar">
                <div style="text-align: left;">
                    <label style="font-size: 0.8em; color: #666;">Fecha de Nacimiento:</label>
                    <input type="date" id="reg-fec">
                </div>
                <input type="number" id="reg-eda" placeholder="Edad Actual">
                <select id="reg-gra">
                    <option value="1">1er Grado</option>
                    <option value="2">2do Grado</option>
                    <option value="3">3er Grado</option>
                    <option value="4">4to Grado</option>
                    <option value="5">5to Grado</option>
                </select>
                <input type="text" id="reg-sec" placeholder="Sección">
                <input type="text" id="reg-pro" placeholder="Nombre del Profesor">
                <input type="text" id="reg-pad" placeholder="Padres / Representante">
                <input type="text" id="reg-tel" placeholder="Teléfono de Contacto">
            </div>
            <button style="margin-top: 15px;" onclick="guardarAlumno()">💾 Guardar Estudiante</button>
        </div>

        <div class="card">
            <h3>📋 Lista de Estudiantes</h3>
            <div id="contenedor-tablas"></div>
        </div>
    </div>
</div>

<div id="modalFicha" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarFicha()">&times;</span>
        <h2 class="ficha-titulo">📄 Ficha del Estudiante</h2>
        <div class="dato-item"><span class="label">Nombres y Apellidos</span><span id="f-nom" class="valor"></span></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="dato-item"><span class="label">Cédula</span><span id="f-ced" class="valor"></span></div>
            <div class="dato-item"><span class="label">Grado</span><span id="f-gra" class="valor"></span></div>
        </div>
        <div class="dato-item"><span class="label">Cédula Escolar</span><span id="f-esc" class="valor"></span></div>
        <div class="dato-item"><span class="label">Representante</span><span id="f-pad" class="valor"></span></div>
        <div class="dato-item"><span class="label">Profesor</span><span id="f-pro" class="valor"></span></div>
        <hr>
        <button id="btnRetiro" style="background: var(--rojo-retiro);" onclick="alternarRetiro()">Marcar como Retirado</button>
    </div>
</div>

<script>
    let alumnos = [];
    let idSeleccionado = "";

    function validar() {
        if(document.getElementById('user').value === "MARIANO" && document.getElementById('pass').value === "12345") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('sistema').style.display = 'block';
        } else { alert("Datos incorrectos"); }
    }

    function guardarAlumno() {
        const alu = {
            id: Date.now().toString(),
            nombre: document.getElementById('reg-nom').value.toUpperCase(),
            cedula: document.getElementById('reg-ced').value,
            escolar: document.getElementById('reg-esc').value,
            grado: document.getElementById('reg-gra').value,
            seccion: document.getElementById('reg-sec').value.toUpperCase(),
            profe: document.getElementById('reg-pro').value,
            padres: document.getElementById('reg-pad').value,
            retirado: false
        };
        alumnos.push(alu);
        actualizarTabla();
    }

    function actualizarTabla() {
        let html = "";
        for(let i=1; i<=5; i++) {
            let lista = alumnos.filter(a => a.grado == i).sort((a,b) => a.nombre.localeCompare(b.nombre));
            if(lista.length > 0) {
                html += `<h4>${i}to Grado</h4><table><tr><th>Nombre</th><th>Sección</th></tr>`;
                lista.forEach(a => {
                    html += `<tr class="${a.retirado ? 'fila-retirado' : ''}" onclick="abrirFicha('${a.id}')">
                        <td>${a.nombre}</td><td>${a.seccion}</td>
                    </tr>`;
                });
                html += `</table>`;
            }
        }
        document.getElementById('contenedor-tablas').innerHTML = html || "<p>Sin registros.</p>";
    }

    function abrirFicha(id) {
        const a = alumnos.find(x => x.id === id);
        idSeleccionado = id;
        document.getElementById('f-nom').innerText = a.nombre;
        document.getElementById('f-ced').innerText = a.cedula;
        document.getElementById('f-esc').innerText = a.escolar;
        document.getElementById('f-gra').innerText = a.grado + "to Grado Seccion " + a.seccion;
        document.getElementById('f-pad').innerText = a.padres;
        document.getElementById('f-pro').innerText = a.profe;
        document.getElementById('modalFicha').style.display = 'block';
    }

    function cerrarFicha() { document.getElementById('modalFicha').style.display = 'none'; }

    function alternarRetiro() {
        let a = alumnos.find(x => x.id === idSeleccionado);
        a.retirado = !a.retirado;
        cerrarFicha();
        actualizarTabla();
    }
</script>
</body>
</html>
