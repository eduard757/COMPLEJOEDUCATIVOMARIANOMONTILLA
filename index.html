<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Mariano Montilla</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* FONDO CON EL ESCUDO */
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), 
                        url('IMG-20260123-WA0146.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .contenedor-principal { text-align: center; width: 100%; max-width: 500px; }
        .escudo-animado { width: 140px; animation: flotar 4s ease-in-out infinite; }
        
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-top: 6px solid #1a2a6c;
        }

        h1 { color: #1a2a6c; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #1a2a6c; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a2a6c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #3498db; }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="IMG-20260123-WA0146.jpg" class="escudo-animado">
        <h1>Complejo Educativo "Mariano Montilla"</h1>
        
        <div class="card">
            <h2 style="color: #1a2a6c;">🔑 Acceso al Sistema</h2>
            <input type="text" id="usuario" placeholder="Usuario (MARIANO)">
            <input type="password" id="clave" placeholder="Contraseña (12345)">
            <button onclick="entrar()">Ingresar a Tesis</button>
        </div>
    </div>

    <script>
        function entrar() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('clave').value;

            if (user === "MARIANO" && pass === "12345") {
                alert("¡Acceso concedido! Bienvenido al sistema institucional.");
                // Aquí podrías redirigir al buscador
            } else {
                alert("Usuario o clave incorrectos.");
            }
        }
    </script>
</body>
</html>
