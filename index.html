<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Mariano Montilla</title>
    <style>
        :root { --azul-oscuro: #1a2a6c; --azul-claro: #3498db; --rojo-retiro: #e74c3c; }
        
        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('IMG-20260123-WA0146.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .contenedor { width: 95%; max-width: 900px; text-align: center; padding: 20px; }
        .escudo-animado { width: 100px; animation: flotar 4s ease-in-out infinite; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 6px solid var(--azul-oscuro); margin-top: 20px; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { background: var(--azul-oscuro); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: var(--azul-claro); }
        .btn-retirar { background: var(--rojo-retiro); margin-top: 5px; padding: 5px; font-size: 0.8em; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; font-size: 0.9em; }
        th { background: var(--azul-oscuro); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .fila-retirado { background-color: #ffcccc !important; color: #c0392b; font-weight: bold; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { background: #eee; color: #333; }
        .tab-active { background: var(--azul-oscuro); color: white; }
    </style>
</head>
<body>

<div class="contenedor">
    <img src="IMG-20260123-WA0146.jpg" class="escudo-animado">
    <h1 style="color: var(--azul-oscuro);">Gestión Escolar "Mariano Montilla"</h1>

    <div id="login" class="card">
        <h2>🔑 Acceso</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="validar()">Entrar al Sistema</button>
    </div>

    <div id="sistema" style="display: none;">
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="mostrarTab('nuevo')">➕ Nuevo Alumno</button>
            <button class="tab-btn" onclick="mostrarTab('lista')">📋 Lista General</button>
        </div>

        <div id="tab-nuevo" class="card">
            <h3>📝 Registro de Nuevo Estudiante</h3>
            <div class="grid-form">
                <input type="text" id="reg-nom" placeholder="Nombres y Apellidos">
                <input type="text" id="reg-ced" placeholder="Cédula Identidad">
                <input type="text" id="reg-esc" placeholder="Cédula Escolar">
                <input type="date" id="reg-fec">
                <input type="number" id="reg-eda" placeholder="Edad">
                <select id="reg-gra">
                    <option value="1">1er Año</option>
                    <option value="2">2do Año</option>
                    <option value="3">3er Año</option>
                    <option value="4">4to Año</option>
                    <option value="5">5to Año</option>
                </select>
                <input type="text" id="reg-sec" placeholder="Sección (A, B, C...)">
                <input type="text" id="reg-pro" placeholder="Nombre del Profesor">
                <input type="text" id="reg-pad" placeholder="Padres / Representante">
                <input type="text" id="reg-tel" placeholder="Teléfono de Contacto">
            </div>
            <button onclick="guardarAlumno()">Guardar Estudiante</button>
        </div>

        <div id="tab-lista" class="card" style="display: none;">
            <h3>📋 Estudiantes por Año y Orden Alfabético</h3>
            <div id="contenedor-tablas" style="overflow-x: auto;"></div>
        </div>
    </div>
</div>

<script>
    let alumnos = [];

    function validar() {
        if(document.getElementById('user').value === "MARIANO" && document.getElementById('pass').value === "12345") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('sistema').style.display = 'block';
        } else { alert("Datos incorrectos"); }
    }

    function mostrarTab(tab) {
        document.getElementById('tab-nuevo').style.display = tab === 'nuevo' ? 'block' : 'none';
        document.getElementById('tab-lista').style.display = tab === 'lista' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('tab-active', (i===0 && tab==='nuevo') || (i===1 && tab==='lista')));
        if(tab === 'lista') actualizarTabla();
    }

    function guardarAlumno() {
        const nuevo = {
            nombre: document.getElementById('reg-nom').value.toUpperCase(),
            cedula: document.getElementById('reg-ced').value,
            escolar: document.getElementById('reg-esc').value,
            fecha: document.getElementById('reg-fec').value,
            edad: document.getElementById('reg-eda').value,
            grado: document.getElementById('reg-gra').value,
            seccion: document.getElementById('reg-sec').value.toUpperCase(),
            profe: document.getElementById('reg-pro').value,
            padres: document.getElementById('reg-pad').value,
            tel: document.getElementById('reg-tel').value,
            retirado: false
        };
        alumnos.push(nuevo);
        alert("Alumno registrado con éxito");
        mostrarTab('lista');
    }

    function actualizarTabla() {
        let html = "";
        for(let i=1; i<=5; i++) {
            let filtrados = alumnos.filter(a => a.grado == i).sort((a,b) => a.nombre.localeCompare(b.nombre));
            if(filtrados.length > 0) {
                html += `<h4>${i}to Año</h4><table><tr><th>Nombre</th><th>Cédula</th><th>Sección</th><th>Estado</th></tr>`;
                filtrados.forEach(a => {
                    html += `<tr class="${a.retirado ? 'fila-retirado' : ''}">
                        <td>${a.nombre}</td><td>${a.cedula}</td><td>${a.seccion}</td>
                        <td><button class="btn-retirar" onclick="marcarRetirado('${a.cedula}')">Retirar</button></td>
                    </tr>`;
                });
                html += `</table>`;
            }
        }
        document.getElementById('contenedor-tablas').innerHTML = html || "<p>No hay alumnos registrados aún.</p>";
    }

    function marcarRetirado(ced) {
        let alu = alumnos.find(a => a.cedula === ced);
        alu.retirado = !alu.retirado;
        actualizarTabla();
    }
</script>
</body>
</html>
